<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VioletFlixTV Shield settings</title>
    <link rel="stylesheet" href="../styles/options.css">
  </head>
  <body>
    <main class="settings-shell">
      <header>
        <p class="eyebrow">Advanced controls</p>
        <h1>VioletFlixTV Shield settings</h1>
        <p>Uses EasyList-style network filters, daily refreshes, popup blocking, and cosmetic hiding for noisy streaming pages.</p>
      </header>

      <section class="panel">
        <h2>Filter lists</h2>
        <div id="listChoices" class="list-grid"></div>
      </section>

      <section class="panel split">
        <div>
          <h2>Refresh</h2>
          <label class="row"><input id="autoRefresh" type="checkbox"> Refresh lists automatically</label>
          <label class="field">Refresh interval in hours <input id="refreshIntervalHours" min="1" max="168" type="number"></label>
          <label class="field">Rule budget <input id="maxRules" min="500" max="4800" step="100" type="number"></label>
        </div>
        <div class="status-box">
          <strong id="ruleCount">0 rules</strong>
          <span id="lastRefresh">Never refreshed</span>
          <button id="refresh" class="primary" type="button">Refresh now</button>
        </div>
      </section>

      <section class="panel textareas">
        <label>Always allow these domains <textarea id="customAllowlist" rows="6" placeholder="example.com\nplayer.example.net"></textarea></label>
        <label>Custom EasyList-style block rules <textarea id="customBlocklist" rows="6" placeholder="||ads.example.com^\n/banner-ad.js$script"></textarea></label>
      </section>

      <section class="panel textareas">
        <label>Temporary site allowlist <textarea id="allowlist" rows="5" placeholder="Sites paused from the popup appear here"></textarea></label>
      </section>

      <footer>
        <p id="status" class="status"></p>
        <button id="save" class="primary" type="button">Save settings</button>
      </footer>
    </main>
    <script src="options.js"></script>
  </body>
</html>
